name: Verbum
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.10
    MACOSX_DEPLOYMENT_TARGET: 13.0
    PRODUCT_BUNDLE_IDENTIFIER: com.studiobluework.verbum
    PRODUCT_NAME: Verbum
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Verbum
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
    INFOPLIST_KEY_NSMicrophoneUsageDescription: Verbum records audio so it can transcribe your speech into text.
    INFOPLIST_KEY_NSAppleEventsUsageDescription: Verbum uses Accessibility and Apple events to paste or insert dictated text into the active app.
    CODE_SIGN_STYLE: Automatic
    ENABLE_APP_SANDBOX: NO
targets:
  Verbum:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - Sources/Verbum
    scheme:
      testTargets: []
